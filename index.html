<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trucking">
<meta name="theme-color" content="#1e5a3c">
<link rel="manifest" href="manifest.json">
<title>Trucking Calculator</title>
<style>
/* ─── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --green:   #1e5a3c;
  --green2:  #163f2a;
  --green-l: #f0fdf4;
  --green-m: #a8e6bf;
  --yellow:  #fefce8;
  --yellow-b: #fde68a;
  --slate:   #1e293b;
  --slate-m: #64748b;
  --slate-l: #f8fafc;
  --border:  #e2e8f0;
  --white:   #ffffff;
  --rad:     12px;
  --safe-b:  env(safe-area-inset-bottom, 0px);
}
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0fdf4;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  color: var(--slate);
}

/* ─── Header ───────────────────────────────────────────────────────────────── */
#app-header {
  background: var(--green);
  color: white;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-left { display: flex; align-items: center; gap: 10px; }

.truck-icon {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

#header-title { font-size: 1rem; font-weight: 700; line-height: 1.1; }
#header-sub   { font-size: 0.72rem; color: var(--green-m); margin-top: 1px; }

.total-pill {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 999px;
  padding: 6px 14px;
  text-align: right;
  flex-shrink: 0;
}
#pill-total  { font-size: 1.1rem; font-weight: 800; line-height: 1; }
#pill-sub    { font-size: 0.65rem; color: var(--green-m); margin-top: 1px; }

/* ─── Scroll area ──────────────────────────────────────────────────────────── */
#scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px;
  padding-bottom: calc(72px + var(--safe-b) + 8px);
}

/* ─── Sections ─────────────────────────────────────────────────────────────── */
.section { display: none; }
.section.active { display: block; }

/* ─── Cards ────────────────────────────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--rad);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 0.67rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--slate-m);
  margin-bottom: 12px;
}

/* ─── Chip grids ───────────────────────────────────────────────────────────── */
.chip-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.chip {
  padding: 11px 6px;
  font-size: 0.82rem;
  font-weight: 500;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--white);
  cursor: pointer;
  text-align: center;
  color: #475569;
  transition: all 0.12s;
  min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.chip:active { transform: scale(0.96); }
.chip.active { background: var(--green); color: white; border-color: var(--green); }

.method-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.method-btn {
  padding: 13px 12px;
  font-size: 0.87rem;
  font-weight: 500;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--white);
  cursor: pointer;
  text-align: left;
  color: #475569;
  transition: all 0.12s;
  min-height: 48px;
}
.method-btn:active { transform: scale(0.97); }
.method-btn.active { background: var(--green); color: white; border-color: var(--green); }

/* ─── Form fields ──────────────────────────────────────────────────────────── */
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 0.83rem;
  font-weight: 600;
  color: #374151;
  margin-bottom: 6px;
}
.hint { font-size: 0.72rem; color: #94a3b8; margin-top: 4px; }

.input-wrap { position: relative; }
.input-prefix, .input-suffix {
  position: absolute; top: 50%; transform: translateY(-50%);
  color: #94a3b8; font-size: 0.9rem; pointer-events: none;
}
.input-prefix { left: 13px; }
.input-suffix { right: 13px; }

input[type="number"] {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 1rem;
  color: var(--slate);
  outline: none;
  background: white;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
  appearance: none;
}
input[type="number"]:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(30,90,60,0.12);
}
input.has-prefix { padding-left: 30px; }
input.has-suffix { padding-right: 36px; }
input[readonly]  { background: var(--slate-l); color: var(--slate-m); }

/* ─── Toggle ───────────────────────────────────────────────────────────────── */
.toggle-row {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; user-select: none;
}
.toggle {
  width: 50px; height: 28px;
  border-radius: 999px; background: #cbd5e1;
  position: relative; flex-shrink: 0;
  transition: background 0.2s; cursor: pointer; border: none;
}
.toggle.on { background: var(--green); }
.toggle::after {
  content: ''; position: absolute;
  top: 4px; left: 4px;
  width: 20px; height: 20px;
  border-radius: 50%; background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(22px); }
.toggle-label { font-size: 0.88rem; color: #475569; font-weight: 500; }

/* ─── Advanced ─────────────────────────────────────────────────────────────── */
.adv-toggle {
  background: none; border: none; cursor: pointer;
  font-size: 0.84rem; color: var(--slate-m);
  display: flex; align-items: center; gap: 5px;
  padding: 8px 0 0; min-height: 44px; width: 100%;
}
.adv-toggle:active { opacity: 0.7; }
.adv-section { border-top: 1px solid #f1f5f9; padding-top: 16px; margin-top: 4px; display: none; }
.adv-section.open { display: block; }

/* ─── Results ──────────────────────────────────────────────────────────────── */
.total-card {
  background: linear-gradient(135deg, var(--green), var(--green2));
  border-radius: var(--rad);
  padding: 22px;
  color: white;
  margin-bottom: 12px;
}
.total-card-label { font-size: 0.78rem; color: var(--green-m); font-weight: 600; margin-bottom: 4px; }
#res-total        { font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
#res-sub          { font-size: 0.82rem; color: var(--green-m); margin-top: 8px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--rad); padding: 14px; }
.stat-label { font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 3px; }
.stat-value { font-size: 1.3rem; font-weight: 700; color: var(--slate); }
.stat-sub   { font-size: 0.72rem; color: #94a3b8; margin-top: 2px; }

.bd-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid #f8fafc;
  font-size: 0.87rem;
}
.bd-row:last-child  { border-bottom: none; padding-bottom: 0; }
.bd-label { color: var(--slate-m); }
.bd-value { font-weight: 600; color: var(--slate); text-align: right; }
.bd-total .bd-label { color: var(--slate); font-weight: 700; font-size: 0.95rem; }
.bd-total .bd-value { color: var(--green); font-size: 1.05rem; }

.unit-card {
  background: var(--yellow); border: 1px solid var(--yellow-b);
  border-radius: var(--rad); padding: 16px; margin-bottom: 12px;
}
.unit-card .card-title { color: #92400e; }
.unit-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.88rem; }
.unit-row span:first-child { color: #78350f; }
.unit-row span:last-child  { font-weight: 700; color: #451a03; }
.warn { color: #d97706; font-weight: 600; }

/* ─── Bottom nav ───────────────────────────────────────────────────────────── */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-b);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  z-index: 100;
}
.nav-btn {
  flex: 1; background: none; border: none; cursor: pointer;
  padding: 10px 0 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 0.72rem; font-weight: 600; color: var(--slate-m);
  transition: color 0.12s;
  min-height: 58px;
}
.nav-btn:active { opacity: 0.7; }
.nav-btn.active { color: var(--green); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 0.7rem; font-weight: 600; }

/* ─── Scrollbar hide ───────────────────────────────────────────────────────── */
#scroll-area::-webkit-scrollbar { display: none; }
#scroll-area { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>

<!-- Header -->
<div id="app-header">
  <div class="header-left">
    <div class="truck-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      </svg>
    </div>
    <div>
      <div id="header-title">Trucking Calc</div>
      <div id="header-sub">Tap to configure</div>
    </div>
  </div>
  <div class="total-pill">
    <div id="pill-total">$0.00</div>
    <div id="pill-sub">Total charge</div>
  </div>
</div>

<!-- Scroll area -->
<div id="scroll-area">

  <!-- ══ CONFIGURE TAB ══════════════════════════════════════════════════════ -->
  <div id="sec-configure" class="section active">

    <div class="card">
      <div class="card-title">Material</div>
      <div class="chip-grid" id="material-grid">
        <button class="chip active" data-material="corn"       onclick="selectMaterial(this)">Corn</button>
        <button class="chip"        data-material="soybeans"   onclick="selectMaterial(this)">Soybeans</button>
        <button class="chip"        data-material="wheat"      onclick="selectMaterial(this)">Wheat</button>
        <button class="chip"        data-material="oats"       onclick="selectMaterial(this)">Oats</button>
        <button class="chip"        data-material="barley"     onclick="selectMaterial(this)">Barley</button>
        <button class="chip"        data-material="fertilizer" onclick="selectMaterial(this)">Fertilizer</button>
        <button class="chip"        data-material="limestone"  onclick="selectMaterial(this)">Limestone</button>
        <button class="chip"        data-material="seed"       onclick="selectMaterial(this)">Seed</button>
        <button class="chip"        data-material="other"      onclick="selectMaterial(this)">Other</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Pricing Method</div>
      <div class="method-grid" id="method-grid">
        <button class="method-btn active" data-method="per_bushel" onclick="selectMethod(this)">Per Bushel</button>
        <button class="method-btn"        data-method="per_ton"    onclick="selectMethod(this)">Per Ton</button>
        <button class="method-btn"        data-method="per_mile"   onclick="selectMethod(this)">Per Mile</button>
        <button class="method-btn"        data-method="per_load"   onclick="selectMethod(this)">Per Load (Flat)</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Load Details</div>

      <div class="field">
        <label for="num-loads">Number of Loads</label>
        <input type="number" id="num-loads" inputmode="decimal" min="1" value="10" oninput="calc()">
      </div>

      <div class="field" id="row-bushels">
        <label for="bushels-per-load">Bushels per Load</label>
        <input type="number" id="bushels-per-load" inputmode="decimal" min="0" value="900" oninput="calc()">
        <div class="hint" id="hint-bu">≈ 22.5 tons per load (56 lbs/bu)</div>
      </div>

      <div class="field" id="row-tons">
        <label for="tons-per-load">Tons per Load</label>
        <input type="number" id="tons-per-load" inputmode="decimal" min="0" step="0.5" value="22" oninput="calc()">
      </div>

      <div class="field">
        <label for="miles-one-way">Miles (one-way)</label>
        <input type="number" id="miles-one-way" inputmode="decimal" min="0" step="0.1" value="20" oninput="calc()">
      </div>

      <div class="field">
        <div class="toggle-row" onclick="toggleRoundTrip()">
          <button class="toggle" id="rt-toggle" type="button"></button>
          <span class="toggle-label" id="rt-label">Round trip (20.0 mi per load)</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Rate</div>

      <div class="field">
        <label for="rate" id="rate-label">Rate (Per Bushel)</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="rate" class="has-prefix" inputmode="decimal" min="0" step="0.01" value="0.12" oninput="calc()">
        </div>
      </div>

      <button class="adv-toggle" type="button" onclick="toggleAdv()">
        <svg id="adv-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        Advanced options
      </button>

      <div class="adv-section" id="adv-section">
        <div class="field">
          <label for="min-charge">Minimum Charge per Load</label>
          <div class="input-wrap">
            <span class="input-prefix">$</span>
            <input type="number" id="min-charge" class="has-prefix" inputmode="decimal" min="0" step="0.01" placeholder="0.00" oninput="calc()">
          </div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label for="fuel-surcharge">Fuel Surcharge %</label>
          <div class="input-wrap">
            <input type="number" id="fuel-surcharge" class="has-suffix" inputmode="decimal" min="0" max="100" step="0.1" placeholder="0" oninput="calc()">
            <span class="input-suffix">%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Reset button inside configure -->
    <button onclick="resetAll()" style="
      width:100%; padding:14px; background:white; border:1.5px solid var(--border);
      border-radius:10px; font-size:0.9rem; font-weight:600; color:var(--slate-m);
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
      margin-bottom:4px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Reset All
    </button>
  </div>

  <!-- ══ RESULTS TAB ════════════════════════════════════════════════════════ -->
  <div id="sec-results" class="section">

    <div class="total-card">
      <div class="total-card-label">Total Trucking Charge</div>
      <div id="res-total">$0.00</div>
      <div id="res-sub">0 loads &nbsp;•&nbsp; $0.00 per load</div>
    </div>

    <div class="stat-grid" id="stat-grid"></div>

    <div class="card">
      <div class="card-title">Charge Breakdown</div>
      <div id="breakdown-rows"></div>
    </div>

    <div class="unit-card" id="unit-card" style="display:none">
      <div class="card-title">Unit Cost Summary</div>
      <div id="unit-rows"></div>
    </div>

  </div>
</div>

<!-- Bottom navigation -->
<nav id="bottom-nav">
  <button class="nav-btn active" id="nav-configure" onclick="showTab('configure')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span>Configure</span>
  </button>
  <button class="nav-btn" id="nav-results" onclick="showTab('results')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    <span>Results</span>
  </button>
</nav>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const MATERIALS = {
  corn:       { label:'Corn',       unit:'bushel', lbs:56, buPerLoad:900 },
  soybeans:   { label:'Soybeans',   unit:'bushel', lbs:60, buPerLoad:850 },
  wheat:      { label:'Wheat',      unit:'bushel', lbs:60, buPerLoad:850 },
  oats:       { label:'Oats',       unit:'bushel', lbs:32, buPerLoad:1000 },
  barley:     { label:'Barley',     unit:'bushel', lbs:48, buPerLoad:900 },
  fertilizer: { label:'Fertilizer', unit:'ton',    tonsPerLoad:22 },
  limestone:  { label:'Limestone',  unit:'ton',    tonsPerLoad:22 },
  seed:       { label:'Seed',       unit:'ton',    tonsPerLoad:20 },
  other:      { label:'Other',      unit:'ton',    tonsPerLoad:20 },
};

const DEFAULT_RATES = { per_bushel:'0.12', per_ton:'8.00', per_mile:'4.00', per_load:'350.00' };
const METHOD_LABELS = { per_bushel:'Per Bushel', per_ton:'Per Ton', per_mile:'Per Mile', per_load:'Per Load (Flat)' };

// ── State ─────────────────────────────────────────────────────────────────────
let material  = 'corn';
let method    = 'per_bushel';
let roundTrip = false;
let advOpen   = false;
let activeTab = 'configure';

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n, d = 2) { return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function fmtC(n)       { return '$' + fmt(n); }
function v(id)         { return parseFloat(document.getElementById(id).value) || 0; }

// ── Tab switching ─────────────────────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  document.getElementById('sec-configure').classList.toggle('active', tab === 'configure');
  document.getElementById('sec-results').classList.toggle('active', tab === 'results');
  document.getElementById('nav-configure').classList.toggle('active', tab === 'configure');
  document.getElementById('nav-results').classList.toggle('active', tab === 'results');
  document.getElementById('scroll-area').scrollTop = 0;
  document.getElementById('header-sub').textContent = tab === 'configure' ? 'Tap to configure' : 'Your estimate';
}

// ── Material ──────────────────────────────────────────────────────────────────
function selectMaterial(btn) {
  material = btn.dataset.material;
  document.querySelectorAll('#material-grid .chip').forEach(b => b.classList.toggle('active', b === btn));
  const cfg = MATERIALS[material];
  if (cfg.unit === 'bushel') document.getElementById('bushels-per-load').value = cfg.buPerLoad;
  else                       document.getElementById('tons-per-load').value    = cfg.tonsPerLoad;
  updateVisibility();
  calc();
}

// ── Method ────────────────────────────────────────────────────────────────────
function selectMethod(btn) {
  method = btn.dataset.method;
  document.querySelectorAll('#method-grid .method-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.getElementById('rate').value = DEFAULT_RATES[method];
  document.getElementById('rate-label').textContent = 'Rate (' + METHOD_LABELS[method] + ')';
  updateVisibility();
  calc();
}

// ── Visibility ────────────────────────────────────────────────────────────────
function updateVisibility() {
  const cfg = MATERIALS[material];
  const isBu = cfg.unit === 'bushel';
  const needsQty = method !== 'per_mile' && method !== 'per_load';
  document.getElementById('row-bushels').style.display = (isBu && needsQty)  ? 'block' : 'none';
  document.getElementById('row-tons').style.display    = (!isBu && needsQty) ? 'block' : 'none';
}

// ── Round trip ────────────────────────────────────────────────────────────────
function toggleRoundTrip() {
  roundTrip = !roundTrip;
  document.getElementById('rt-toggle').classList.toggle('on', roundTrip);
  calc();
}

// ── Advanced ──────────────────────────────────────────────────────────────────
function toggleAdv() {
  advOpen = !advOpen;
  document.getElementById('adv-section').classList.toggle('open', advOpen);
  document.getElementById('adv-icon').querySelector('polyline')
    .setAttribute('points', advOpen ? '6 15 12 9 18 15' : '6 9 12 15 18 9');
}

// ── Calculation ───────────────────────────────────────────────────────────────
function calc() {
  const cfg      = MATERIALS[material];
  const loads    = v('num-loads');
  const bpl      = v('bushels-per-load');
  const tpl      = v('tons-per-load');
  const milesOW  = v('miles-one-way');
  const miles    = milesOW * (roundTrip ? 2 : 1);
  const rate     = v('rate');
  const minC     = v('min-charge');
  const fuelPct  = v('fuel-surcharge');
  const lbs      = cfg.lbs || 56;
  const tonsFromBu = (bpl * lbs) / 2000;

  // Update hints
  document.getElementById('hint-bu').textContent =
    '≈ ' + fmt(tonsFromBu, 2) + ' tons per load (' + lbs + ' lbs/bu)';
  document.getElementById('rt-label').textContent =
    'Round trip (' + fmt(roundTrip ? milesOW * 2 : milesOW, 1) + ' mi per load)';

  // Totals
  let totalBu = 0, totalTons = 0;
  const totalMiles = loads * miles;
  if (cfg.unit === 'bushel') { totalBu = loads * bpl; totalTons = loads * tonsFromBu; }
  else                       { totalTons = loads * tpl; }

  // Per-load charge
  let cpl = 0;
  if (method === 'per_bushel') cpl = rate * (cfg.unit === 'bushel' ? bpl : 0);
  if (method === 'per_ton')    cpl = rate * (cfg.unit === 'bushel' ? tonsFromBu : tpl);
  if (method === 'per_mile')   cpl = rate * miles;
  if (method === 'per_load')   cpl = rate;

  const minApplied = minC > 0 && cpl < minC;
  if (minApplied) cpl = minC;

  const baseTotal  = cpl * loads;
  const fuelAmt    = baseTotal * (fuelPct / 100);
  const grand      = baseTotal + fuelAmt;
  const costPerBu  = totalBu   > 0 ? grand / totalBu   : 0;
  const costPerTon = totalTons > 0 ? grand / totalTons : 0;
  const costPerMi  = totalMiles > 0 ? grand / totalMiles : 0;

  // ── Header pill ──────────────────────────────────────────────────────────
  document.getElementById('pill-total').textContent = fmtC(grand);
  document.getElementById('pill-sub').textContent   = fmt(loads, 0) + ' loads';

  // ── Results tab ──────────────────────────────────────────────────────────
  document.getElementById('res-total').textContent = fmtC(grand);
  document.getElementById('res-sub').innerHTML =
    fmt(loads, 0) + ' load' + (loads !== 1 ? 's' : '') +
    ' &nbsp;•&nbsp; ' + fmtC(cpl) + ' per load';

  // Stats
  const stats = [];
  if (totalBu > 0)    stats.push({ label:'Total Bushels', value: fmt(totalBu, 0) + ' bu', sub: fmtC(costPerBu) + '/bu' });
  if (totalTons > 0)  stats.push({ label:'Total Tons',    value: fmt(totalTons, 1) + ' t', sub: fmtC(costPerTon) + '/ton' });
  if (totalMiles > 0) stats.push({ label:'Total Miles',   value: fmt(totalMiles, 0) + ' mi', sub: fmtC(costPerMi) + '/mi' });
  stats.push({ label:'Charge / Load', value: fmtC(cpl), sub: fmt(loads, 0) + ' loads' });

  document.getElementById('stat-grid').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`
  ).join('');

  // Breakdown
  const rows = [];
  rows.push({ l: 'Rate', r: fmtC(rate) + ' / ' + METHOD_LABELS[method].replace('Per ', '').toLowerCase() });
  if (method === 'per_bushel' && totalBu > 0)  rows.push({ l: 'Bushels hauled', r: fmt(totalBu, 0) + ' bu' });
  if (method === 'per_ton'    && totalTons > 0) rows.push({ l: 'Tons hauled', r: fmt(totalTons, 2) + ' t' });
  if (method === 'per_mile') rows.push({ l: 'Total miles', r: fmt(totalMiles, 0) + ' mi (' + fmt(miles, 1) + ' × ' + fmt(loads, 0) + ' loads)' });
  if (method === 'per_load') rows.push({ l: 'Loads', r: fmt(loads, 0) });
  if (minApplied)  rows.push({ l: '<span class="warn">Minimum charge applied</span>', r: '<span class="warn">' + fmtC(minC) + '/load</span>' });
  rows.push({ l: 'Base total', r: fmtC(baseTotal) });
  if (fuelAmt > 0) rows.push({ l: 'Fuel surcharge (' + fuelPct + '%)', r: '+ ' + fmtC(fuelAmt) });

  document.getElementById('breakdown-rows').innerHTML =
    rows.map(r => `<div class="bd-row"><span class="bd-label">${r.l}</span><span class="bd-value">${r.r}</span></div>`).join('') +
    `<div class="bd-row bd-total"><span class="bd-label">Grand Total</span><span class="bd-value">${fmtC(grand)}</span></div>`;

  // Unit costs
  const uc = document.getElementById('unit-card');
  if (totalBu > 0 || totalTons > 0) {
    uc.style.display = 'block';
    const ur = [];
    if (totalBu > 0)    ur.push({ l:'Cost per bushel', r: fmtC(costPerBu)  + '/bu'  });
    if (totalTons > 0)  ur.push({ l:'Cost per ton',    r: fmtC(costPerTon) + '/ton' });
    if (totalMiles > 0) ur.push({ l:'Cost per mile',   r: fmtC(costPerMi)  + '/mi'  });
    document.getElementById('unit-rows').innerHTML =
      ur.map(r => `<div class="unit-row"><span>${r.l}</span><span>${r.r}</span></div>`).join('');
  } else {
    uc.style.display = 'none';
  }
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetAll() {
  material = 'corn'; method = 'per_bushel'; roundTrip = false; advOpen = false;
  document.querySelectorAll('#material-grid .chip').forEach(b => b.classList.toggle('active', b.dataset.material === 'corn'));
  document.querySelectorAll('#method-grid .method-btn').forEach(b => b.classList.toggle('active', b.dataset.method === 'per_bushel'));
  document.getElementById('num-loads').value        = '10';
  document.getElementById('bushels-per-load').value = '900';
  document.getElementById('tons-per-load').value    = '22';
  document.getElementById('miles-one-way').value    = '20';
  document.getElementById('rate').value             = '0.12';
  document.getElementById('min-charge').value       = '';
  document.getElementById('fuel-surcharge').value   = '';
  document.getElementById('rate-label').textContent = 'Rate (Per Bushel)';
  document.getElementById('rt-toggle').classList.remove('on');
  document.getElementById('adv-section').classList.remove('open');
  document.getElementById('adv-icon').querySelector('polyline').setAttribute('points', '6 9 12 15 18 9');
  updateVisibility();
  calc();
  showTab('configure');
}

// ── PWA service worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateVisibility();
calc();
</script>
